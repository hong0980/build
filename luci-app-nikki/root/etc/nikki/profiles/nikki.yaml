# ============================================================================
# 官方完整配置示例: https://github.com/MetaCubeX/mihomo/blob/Meta/docs/config.yaml
# ============================================================================

Anchor_PR: &Anchor_PR {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.g.cn/generate_204', interval: 300}, filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置|域名)).*$"}
# ================= 机场订阅 =================
proxy-providers:
#  机场名: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '[机场名] '}}
  cloud: {<<: *Anchor_PR, url: '', override: {additional-prefix: '[cloud] '}}

# ================= 全局设置 =================

port: 7080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
allow-lan: true                      # 允许局域网设备接入代理端口/Tun
bind-address: "*"                    # 配合 allow-lan，监听所有网卡
mode: rule                           # 代理模式：rule / global / direct
ipv6: false                          # 全局 IPv6 开关，同时控制 DNS 是否解析 AAAA
unified-delay: true                  # 统一延迟计算方式，测速更准确
tcp-concurrent: true                 # 多个解析 IP 并发握手，取最快
log-level: warning                   # 日志等级：silent/error/warning/info/debug
find-process-mode: 'off'             # 不匹配进程，路由器场景推荐
client-fingerprint: chrome           # 全局默认 TLS 指纹
keep-alive-idle: 600                 # TCP keepalive 空闲探测时间（秒）
keep-alive-interval: 15              # TCP keepalive 探测间隔（秒）
disable-keep-alive: false            # 是否禁用 keepalive

# ================= 嗅探 =================
sniffer:
  enable: true                        # 启用流量嗅探（从 SNI/Host/QUIC 提取真实域名）
  sniff:
    HTTP:
      ports: [80, 8080-8880]          # 嗅探 HTTP Host 的端口范围
      override-destination: true      # 用嗅探结果覆盖实际连接目标
    TLS:
      ports: [443, 8443]              # 嗅探 TLS SNI 的端口范围
    QUIC:
      ports: [443, 8443]              # 嗅探 QUIC（HTTP/3）SNI 的端口范围
  # skip-dst-address:                 # 按目标 IP 跳过嗅探
  #   - 111.1.171.0/24
  #   - 39.174.182.0/23
  force-domain:
    - "+.v2ex.com"                    # 强制嗅探该域名
  skip-domain:                        # 跳过嗅探，改用连接真实 IP/端口判断规则
    - "rule-set:private_domain,cn_domain"
    - "+.goofish.com"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.vivox.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.wql.us"
    - "+.keywordsstudios.cn"

# ================= DNS模块 =================
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '*.lan'
    - "rule-set:fakeipfilter_domain,direct_domain,cn_domain"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  nameserver:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query

  nameserver-policy:
    "rule-set:private_domain,cn_domain,apple_domain":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "rule-set,ww_reject": rcode://success

# ================= 入站 Tun =================
tun:
  enable: true                        # 启用 Tun 虚拟网卡
  stack: mixed                        # Tun 协议栈实现
  dns-hijack: ["any:53", "tcp://any:53"] # 劫持所有 53 端口 DNS 请求到内置 DNS
  mtu: 1380                           # Tun 网卡 MTU
  auto-route: true                    # 自动配置路由表，将流量导入 Tun
  auto-redirect: true                 # 自动配置 iptables/nftables 重定向 TCP（仅 Linux，依赖 auto-route）
  auto-detect-interface: true         # 自动识别出口物理网卡，避免流量递归进 Tun

ip:          &ip          {type: http, interval: 86400, behavior: ipcidr,    format: mrs}
domain:      &domain      {type: http, interval: 86400, behavior: domain,    format: mrs}
class:       &class       {type: http, interval: 86400, behavior: classical, format: text}
domain_text: &domain_text {type: http, interval: 86400, behavior: domain,    format: yaml}
class_yaml:  &class_yaml  {type: http, interval: 86400, behavior: classical, format: yaml}
groups:      &groups      {type: url-test, include-all: true, tolerance: 50, interval: 300, url: https://cp.cloudflare.com/generate_204}
# 策略组公共锚点：url-test 自动选延迟最低节点；use 引用订阅；include-all 纳入全部已知节点；
# tolerance 为同档延迟容差（ms）；url 为测速探测地址

proxies:
  - {name: 🎯 国内, type: direct, udp: true, proxies: [DIRECT]} # 手写国内节点，供订阅拉取出口及规则引用

proxy-groups:
  - {name: 自动选择,  <<: *groups, filter: "(?i)^(?!.*(国内)).*$", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/Rocket.png}
  - {name: 🚀 AI,    <<: *groups, filter: "(?i)^(?!.*(俄罗斯|土耳其|印度|港|HK|国内)).*$", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/Claude.png}
  - {name: 香港自动,   <<: *groups, filter: "(?i)(香港|HK)", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/HK.png}
  - {name: 日本自动,   <<: *groups, filter: "(?i)(日本|jp)", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/JP.png}
  - {name: 台湾自动,   <<: *groups, filter: "(?i)(台湾|tw)", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/TW.png}
  - {name: 美国自动,   <<: *groups, filter: "(?i)(美国|us)", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/US.png}
  - {name: 新加坡自动, <<: *groups, filter: "(?i)(新加坡|sg)", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/SG.png}
  - {name: 韩国自动,  <<: *groups, filter: "(?i)(韩国|🇰🇷)", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/KR.png}
  - {name: 其他,     <<: *groups, filter: "(?i)^(?!.*(港|HK|台|日|美|新|国内)).*$", icon: https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/icons/OT.png}
  # 各分组按节点命名关键字筛选，依赖机场命名规范一致

rules:
  #- AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,goofish.com)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,taobao.com)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,alicdn.com)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,cn)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443)),REJECT # 拦截 QUIC，强制回退 TCP
  #- IP-CIDR,10.0.0.0/24,DIRECT
  #- IP-CIDR,192.168.6.0/24,DIRECT
  #- AND,((DOMAIN-SUFFIX,netflix.com),(NETWORK,UDP)),REJECT
  - RULE-SET,ww_reject,REJECT
  - RULE-SET,private_domain,🎯 国内     # 局域网/内网保留域名国内
  - RULE-SET,cn_domain,🎯 国内          # 国内域名国内
  - RULE-SET,cn_ip,🎯 国内,no-resolve   # 国内 IP 段国内，不为此规则单独触发解析
  - RULE-SET,apple_domain,🎯 国内       # 苹果服务国内
  - RULE-SET,cdn_cn,🎯 国内
  - RULE-SET,pt_classical,🎯 国内
  - RULE-SET,ai_domain,🚀 AI
  - RULE-SET,bybit_domain,日本自动
  - RULE-SET,github_domain,自动选择
  - RULE-SET,youtube_domain,自动选择
  - RULE-SET,tiktok_domain,自动选择
  - RULE-SET,netflix_domain,新加坡自动
  - RULE-SET,disney_domain,新加坡自动
  - RULE-SET,speedtest_domain,自动选择
  - RULE-SET,telegram_domain,自动选择
  - RULE-SET,paypal_domain,自动选择
  - RULE-SET,gfw_domain,自动选择
  - RULE-SET,geolocation-!cn,自动选择
  - RULE-SET,direct_domain,🎯 国内
  - GEOIP,CN,🎯 国内                    # 兜底：目标 IP 属地中国大陆国内
  - GEOIP,PRIVATE,🎯 国内               # 私有/内网 IP 段国内
  - MATCH,自动选择                       # 兜底规则，需放最后

# 配置文件持久化设置
profile:
  store-selected: true                # 记住策略组手动选择的节点
  store-fake-ip: true                 # 持久化 fake-ip 映射表

external-ui: ui                       # WebUI 目录
external-ui-name: Zashboard           # WebUI 名称
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip  # WebUI 下载地址
external-controller: '[::]:9090'      # RESTful API 监听地址
secret: "709777"                      # RESTful API 鉴权密钥
geodata-mode: false                   # false 使用 .dat 格式；true 需改用 .metadb（与 geox-url 对应）
geodata-loader: standard
geox-url:
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  asn: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb
  # geo 数据文件下载地址，如访问不畅可换 raw.githubusercontent.com 等镜像

rule-providers:
  # 远程规则集，指向 meta-rules-dat 仓库的预编译 .mrs 文件
  direct_domain:   {<<: *domain, url: "https://testingcf.jsdelivr.net/gh/Seven1echo/Yaml@main/rules/Seven1_Direct_Domain.mrs"}
