# ================= 机场订阅 =================
proxy-providers:
  cloud:
    url: ""
    type: http
    interval: 86400
    path: "./proxy_provider/airport.yaml"
    filter: "(?i)^(?!.*(到期|域名|剩余)).*$"
    proxy: 直连
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300
    override:
      # 强制将所有下载的节点 packet-encoding 设为空，解决 xudp 导致的无延迟问题
      packet-encoding: ""
      client-fingerprint: "chrome"
# ================= 全局设置 =================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
mode: rule
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
# interface-name: veth-mihomo
client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false

# 配置文件持久化设置
profile:
  store-selected: true
  store-fake-ip: true

# ================= 嗅探 =================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # skip-dst-address:
  #   - 111.1.171.0/24
  #   - 39.174.182.0/23
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "rule-set:private_domain,cn_domain"
    - "+.goofish.com"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.vivox.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.wql.us"
    - "+.keywordsstudios.cn"

# ================= DNS模块 =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  # 【优化】让国内域名不过 Fake-IP，直接返回真实 IP，配合直连规则
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "*.lan"
    - "*.local"
    - "+.services.googleapis.cn"
    - "+.xn--ngstr-lra8j.com"
    - "time.*.com"
    - "+.pool.ntp.org"
    - "+.ntp.tencent.com"
    - "+.ntp1.aliyun.com"
    - "+.ntp.ntsc.ac.cn"
    - "+.cn.ntp.org.cn"
    - "*.microsoftonline.com"
    - "*.wql.us"
    - "*.microsoft.com"
    - "*.keywordsstudios.cn"
    - "geosite:cn"

  #DNS 分流策略：国内域名强制用国内 DNS 解析
  nameserver-policy:
    "geosite:cn,private":
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
    "rule-set:cn_domain":
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  default-nameserver:
    - 223.5.5.5
    - 1.12.12.12
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
        - 240.0.0.0/4

# ================= 入站 Tun =================
tun:
  enable: true
  stack: mixed
  device: tun0
  dns-hijack: ["any:53", "tcp://any:53"]
  mtu: 1380
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true

# ================= 出站策略 =================
groups: &groups {type: url-test, use: [cloud], include-all: true, tolerance: 50, interval: 300, url: http://www.gstatic.com/generate_204}

proxies:
  - {name: 🎯 直连, type: direct, udp: true}

proxy-groups:
  - {name: ♻️ 自动选择, <<: *groups, filter: "(?i)^(?!.*(直连)).*$"}
  - {name: ♻️ 香港自动, <<: *groups, filter: "(?i)(香港|HK)"}
  - {name: ♻️ 日本自动, <<: *groups, filter: "(?i)(日本|jp)"}
  - {name: ♻️ 台湾自动, <<: *groups, filter: "(?i)(台湾|tw)"}
  - {name: ♻️ 美国自动, <<: *groups, filter: "(?i)(美国|us)"}
  - {name: ♻️ 新加坡自动, <<: *groups, filter: "(?i)(新加坡|sg)"}
  - {name: ♻️ AI, <<: *groups, filter: "(?i)^(?!.*(俄罗斯|土耳其|印度|港|HK|直连)).*$"}
  - {name: ♻️ 其他, <<: *groups, filter: "(?i)^(?!.*(港|HK|台|日|美|新|直连)).*$"}

rules:
  #- AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,goofish.com)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,taobao.com)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443),(DOMAIN-SUFFIX,alicdn.com)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,cn)),DIRECT
  #- AND,((NETWORK,UDP),(DST-PORT,443)),REJECT # 拦截 QUIC，强制回退 TCP
  #- IP-CIDR,10.0.0.0/24,DIRECT
  #- IP-CIDR,192.168.6.0/24,DIRECT
  #- AND,((DOMAIN-SUFFIX,netflix.com),(NETWORK,UDP)),REJECT
  - RULE-SET,private_domain,🎯 直连
  - RULE-SET,cn_domain,🎯 直连
  - RULE-SET,ww_reject,REJECT
  - RULE-SET,cn_ip,🎯 直连,no-resolve
  - GEOIP,CN,🎯 直连
  - GEOIP,PRIVATE,🎯 直连
  - RULE-SET,apple_domain,🎯 直连
  - RULE-SET,ai_domain,♻️ AI
  - RULE-SET,bybit_domain,♻️ 日本自动
  - RULE-SET,github_domain,♻️ 自动选择
  - RULE-SET,youtube_domain,♻️ 自动选择
  - RULE-SET,tiktok_domain,♻️ 美国自动
  - RULE-SET,netflix_domain,♻️ 新加坡自动
  - RULE-SET,disney_domain,♻️ 新加坡自动
  - RULE-SET,speedtest_domain,♻️ 自动选择
  - RULE-SET,telegram_domain,♻️ 自动选择
  - RULE-SET,paypal_domain,♻️ 自动选择
  - RULE-SET,gfw_domain,♻️ 自动选择
  - RULE-SET,geolocation-!cn,♻️ 自动选择
  - RULE-SET,ww_proxy,♻️ 自动选择
  - MATCH,♻️ 自动选择

geodata-mode: false
geodata-loader: standard
geox-url:
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  asn: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

rule-anchor:
  ip:          &ip          {type: http, interval: 86400, behavior: ipcidr,    format: mrs}
  domain:      &domain      {type: http, interval: 86400, behavior: domain,    format: mrs}
  class:       &class       {type: http, interval: 86400, behavior: classical, format: text}
  domain_text: &domain_text {type: http, interval: 86400, behavior: domain,    format: yaml}

rule-providers:
  ai_domain: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"}
